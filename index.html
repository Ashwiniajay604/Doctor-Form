<html>

    <title>Doctor Appointment Form</title>
</head>

<body>

<header>
    <h1 align="center"><u>ABC Hospital</u></h1>
    <h2 align="center">Doctor Appointment Form</h2>
</header>

<p align="center">
    Welcome to ABC Hospital.<br>
    Fill the form below to book your appointment.
</p>

<center>
    <img src="images.jpg" alt="Doctor Image" width="250" height="200">
</center>

<br>


<hr>

<h2><u>Patient Details</u></h2>

<form>

Patient Name:<br>
<input type="text" placeholder="Enter your name">
<br><br>

Age:<br>
<input type="number">
<br><br>

Gender:<br>
<input type="radio" name="gender"> Male
<input type="radio" name="gender"> Female
<br><br>

Phone Number:<br>
<input type="tel">
<br><br>

Email:<br>
<input type="email">
<br><br>

Appointment Date:<br>
<input type="date">
<br><br>

Select Department:<br>
<input type="text" placeholder="General / Dental / Eye">
<br><br>

Symptoms:<br>
<input type="checkbox"> Fever<br>
<input type="checkbox"> Cough<br>
